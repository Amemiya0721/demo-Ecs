<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>商品登録 | OVERHAUL Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <div class="container py-5">

        <h1 class="mb-4">
            商品登録
        </h1>

        <form id="productForm">

            <!-- 商品名 -->
            <div class="mb-3">

                <label class="form-label">
                    商品名
                </label>

                <input type="text" id="name" class="form-control" required>

            </div>

            <!-- カテゴリ -->
            <div class="mb-3">

                <label class="form-label">
                    カテゴリ
                </label>

                <select id="category" class="form-select">

                    <option value="コンポーネント">コンポーネント</option>
                    <option value="ホイール">ホイール</option>
                    <option value="フレーム">フレーム</option>
                    <option value="ハンドル">ハンドル</option>
                    <option value="ブレーキ">ブレーキ</option>
                    <option value="サドル">サドル</option>
                    <option value="シフター">シフター</option>
                    <option value="ディレイラー">ディレイラー</option>

                </select>

            </div>

            <!-- メーカー -->
            <div class="mb-3">

                <label class="form-label">
                    メーカー
                </label>

                <input type="text" id="manufacturer" class="form-control">

            </div>

            <!-- 年式 -->
            <div class="mb-3">

                <label class="form-label">
                    年式
                </label>

                <input type="text" id="year" class="form-control">

            </div>

            <!-- 価格 -->
            <div class="mb-3">

                <label class="form-label">
                    価格
                </label>

                <input type="number" id="price" class="form-control" required>

            </div>

            <!-- ランク -->
            <div class="mb-3">

                <label class="form-label">
                    ランク
                </label>

                <select id="rank" class="form-select">

                    <option>A</option>
                    <option>B</option>
                    <option>C</option>

                </select>

            </div>

            <!-- ジャンク -->
            <div class="form-check mb-3">

                <input type="checkbox" class="form-check-input" id="junk">

                <label class="form-check-label" for="junk">

                    ジャンク品

                </label>

            </div>

            <!-- 状態説明 -->
            <div class="mb-4">

                <label class="form-label">
                    商品状態
                </label>

                <textarea id="conditionText" class="form-control" rows="3"></textarea>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    商品画像

                </label>

                <input type="file" id="images" class="form-control" multiple accept="image/*">

            </div>

            <button class="btn btn-dark" type="submit">

                登録

            </button>

        </form>

    </div>

    <script src="js/product-new.js"></script>

</body>

</html>
