<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OVERHAUL — 点検済みの中古車体</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #ffffff;
      --line: #d9d5ca;
      --text: #1e1f1c;
      --muted: #6c7167;
      --accent: #2f5d50;
      --accent-2: #8a6430;
      --grade-s: #1f6b54;
      --grade-a: #567a3d;
      --grade-b: #9a6e2e;
      --grade-c: #8c4f39;
      --soft: #f1eee7;
      --shadow: 0 10px 30px rgba(0, 0, 0, .06);
      --radius: 18px;
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family:
        "Noto Sans JP",
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        system-ui,
        -apple-system,
        sans-serif;
      letter-spacing: .01em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .mono {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    .site-header {
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      cursor: pointer;
      user-select: none;
    }

    .brand-main {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: .06em;
      line-height: 1;
    }

    .brand-sub {
      color: var(--muted);
      font-size: .82rem;
      margin-top: .15rem;
      display: block;
    }

    .nav-link-custom {
      color: #30352f;
      font-weight: 500;
      position: relative;
    }

    .nav-link-custom:hover {
      color: var(--accent);
    }

    .hero-box {
      padding: 3rem 0 2rem;
    }

    .eyebrow {
      display: inline-block;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: .75rem;
    }

    .hero-title {
      font-size: clamp(2rem, 4vw, 3.3rem);
      line-height: 1.1;
      font-weight: 900;
      margin-bottom: 1rem;
    }

    .hero-copy {
      max-width: 760px;
      color: #4f544c;
      line-height: 1.9;
      font-size: 1rem;
    }

    .filter-bar {
      background: rgba(255, 255, 255, .78);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: .7rem .85rem;
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .filter-label {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .12em;
      margin-right: .25rem;
      white-space: nowrap;
    }

    .chip {
      border-radius: 999px;
      border: 1px solid #cfc9bb;
      background: #fff;
      color: #34362f;
      padding: .5rem .95rem;
      font-size: .92rem;
      transition: .22s var(--ease);
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip.on {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    .count-text {
      color: var(--muted);
      font-size: .92rem;
      white-space: nowrap;
    }

    .stock-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: .28s var(--ease);
      opacity: 0;
      transform: translateY(14px);
      height: 100%;
    }

    .stock-card.in {
      opacity: 1;
      transform: translateY(0);
    }

    .stock-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, .09);
    }

    .stock-card:focus-visible {
      outline: 3px solid rgba(47, 93, 80, .22);
      outline-offset: 2px;
    }

    .shot {
      position: relative;
      background:
        linear-gradient(180deg, #f9fbff 0%, #f1f5fb 100%);
      padding: 1rem;
      border-bottom: 1px solid #e5e1d7;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .grade-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .42rem .68rem;
      border-radius: 999px;
      color: #fff;
      font-weight: 800;
      font-size: .8rem;
      box-shadow: 0 6px 14px rgba(0, 0, 0, .15);
    }

    .g-S .grade-badge {
      background: var(--grade-s);
    }

    .g-A .grade-badge {
      background: var(--grade-a);
    }

    .g-B .grade-badge {
      background: var(--grade-b);
    }

    .g-C .grade-badge {
      background: var(--grade-c);
    }

    .grade-dot {
      width: 1.55rem;
      height: 1.55rem;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .18);
      border: 1px solid rgba(255, 255, 255, .28);
      font-size: .8rem;
      line-height: 1;
    }

    .photo-tag {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 2;
      border-radius: 999px;
      padding: .36rem .6rem;
      background: rgba(32, 36, 42, .88);
      color: #fff;
      font-size: .75rem;
      letter-spacing: .05em;
    }

    .card-body-custom {
      padding: 1rem 1rem 1.05rem;
    }

    .card-type {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: .72rem;
      margin-bottom: .35rem;
    }

    .card-title-custom {
      font-weight: 800;
      font-size: 1.1rem;
      line-height: 1.35;
      margin-bottom: .45rem;
    }

    .card-state {
      color: #53584f;
      font-size: .92rem;
      line-height: 1.7;
      min-height: 3.2em;
      margin-bottom: 1rem;
    }

    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 1rem;
    }

    .price {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: .01em;
    }

    .yen {
      font-size: .78em;
      margin-right: .08em;
    }

    .spec {
      color: var(--muted);
      font-size: .85rem;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      margin-bottom: 1rem;
      color: #495048;
      font-weight: 600;
      cursor: pointer;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .detail-panel,
    .detail-side {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .detail-panel {
      padding: 1rem;
    }

    .main-shot {
      background: linear-gradient(180deg, #f9fbff 0%, #f2f6fb 100%);
      border: 1px solid #e4e0d6;
      border-radius: 16px;
      min-height: 360px;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .thumb {
      background: linear-gradient(180deg, #f9fbff 0%, #f2f6fb 100%);
      border: 1px solid #ddd8cb;
      border-radius: 14px;
      padding: .5rem;
      cursor: pointer;
      transition: .2s var(--ease);
      min-height: 92px;
      display: grid;
      place-items: center;
    }

    .thumb.on,
    .thumb:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(47, 93, 80, .10) inset;
    }

    .detail-side {
      padding: 1.4rem;
    }

    .d-type {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: .78rem;
      margin-bottom: .45rem;
    }

    .d-title {
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: .55rem;
    }

    .d-year {
      color: #4f544c;
      margin-bottom: .9rem;
    }

    .d-price {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: .3rem;
    }

    .d-tax {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 1.25rem;
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .75rem;
      margin-bottom: 1.2rem;
    }

    .fact {
      border: 1px solid #e3ded2;
      background: #faf8f3;
      border-radius: 14px;
      padding: .85rem .9rem;
    }

    .fact .k {
      color: var(--muted);
      font-size: .76rem;
      margin-bottom: .28rem;
    }

    .fact .v {
      font-weight: 700;
      font-size: .95rem;
    }

    .karte {
      border: 1px solid #e1ddd1;
      border-radius: 16px;
      padding: 1rem;
      background: #fcfbf8;
      margin-bottom: 1.2rem;
    }

    .karte-head {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .ring {
      position: relative;
      width: 64px;
      height: 64px;
      flex: 0 0 auto;
    }

    .ring svg {
      width: 64px;
      height: 64px;
      display: block;
    }

    .ring b {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 1.05rem;
      font-weight: 900;
    }

    .kt {
      font-weight: 800;
      margin-bottom: .2rem;
    }

    .kd {
      color: var(--muted);
      font-size: .9rem;
    }

    .krow {
      display: grid;
      grid-template-columns: 88px 1fr 1.4fr;
      gap: .8rem;
      align-items: center;
      padding: .7rem 0;
      border-top: 1px dashed #ddd6c8;
    }

    .krow:first-of-type {
      border-top: 0;
    }

    .cat {
      font-weight: 700;
      font-size: .92rem;
    }

    .meter {
      height: 10px;
      border-radius: 999px;
      background: #e7e2d7;
      overflow: hidden;
      position: relative;
    }

    .meter i {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent) 0%, #87a278 100%);
      transition: width 1s var(--ease);
    }

    .note {
      color: #4f544c;
      font-size: .9rem;
      line-height: 1.55;
    }

    .desc,
    .ship {
      border: 1px solid #e3ded2;
      border-radius: 16px;
      padding: 1rem;
      background: #fff;
      margin-bottom: 1rem;
    }

    .desc h3,
    .ship h3 {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: .85rem;
    }

    .desc ul {
      margin: 0;
      padding-left: 1.2rem;
      line-height: 1.9;
      color: #454b43;
    }

    .ship-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: .55rem 0;
      border-top: 1px dashed #ddd6c8;
    }

    .ship-row:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .ship-row .sv {
      font-weight: 700;
    }

    .small-note {
      color: var(--muted);
      font-size: .88rem;
      margin-top: .7rem;
      margin-bottom: 0;
      line-height: 1.7;
    }

    .cta {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      margin-top: 1.1rem;
    }

    .btn-main {
      border: 0;
      background: var(--text);
      color: #fff;
      font-weight: 700;
      border-radius: 999px;
      padding: .95rem 1.4rem;
      transition: .22s var(--ease);
    }

    .btn-main:hover {
      background: #32352f;
      transform: translateY(-1px);
    }

    .btn-ghost {
      border: 1px solid #cbc5b8;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      border-radius: 999px;
      padding: .95rem 1rem;
      min-width: 58px;
      transition: .22s var(--ease);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .site-footer {
      border-top: 1px solid var(--line);
      margin-top: 4rem;
      background: rgba(255, 255, 255, .7);
    }

    .footer-inner {
      color: #5d645b;
      font-size: .9rem;
      padding: 1.1rem 0;
    }

    .svg-art {
      width: 100%;
      max-width: 380px;
      height: auto;
      display: block;
    }

    @media (max-width: 991.98px) {
      .facts {
        grid-template-columns: 1fr;
      }

      .krow {
        grid-template-columns: 1fr;
        gap: .45rem;
      }

      .main-shot {
        min-height: 280px;
      }
    }

    @media (max-width: 575.98px) {
      .filter-bar {
        border-radius: 24px;
      }

      .hero-box {
        padding-top: 2rem;
      }

      .shot {
        min-height: 220px;
      }

      .d-price {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="site-header sticky-top">
    <div class="container py-3">
      <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
        <div class="brand" onclick="showListing()" tabindex="0" role="button" aria-label="トップへ">
          <div class="brand-main">OVERHAUL</div>
          <small class="brand-sub">点検済みの中古車体</small>
        </div>

        <nav class="d-none d-lg-flex align-items-center gap-4">
          <a href="javascript:void(0)" class="nav-link-custom" onclick="showListing()">在庫一覧</a>
          <a href="javascript:void(0)" class="nav-link-custom" onclick="showListing()">状態基準</a>
          <a href="javascript:void(0)" class="nav-link-custom" onclick="showListing()">送料・配送</a>
          <a href="javascript:void(0)" class="nav-link-custom" onclick="showListing()">査定を依頼</a>
        </nav>

        <button class="btn btn-outline-dark rounded-pill px-3">
          カート <span class="badge text-bg-dark rounded-pill ms-1 mono">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- LISTING -->
  <section id="listing" class="view active">
    <div class="container">
      <div class="hero-box">
        <div class="eyebrow">Used road bikes &amp; motorcycles</div>
        <h1 class="hero-title">使える中古、まだ眠っています。</h1>
        <p class="hero-copy">
          自転車・バイクの中古車体やパーツを掲載。
          状態に個体差はありますが、価格と状態を見比べながら、
          掘り出し物を探せる在庫型ストアです。
        </p>
      </div>

      <div class="filter-bar d-flex flex-wrap align-items-center gap-2" id="filters">
        <span class="filter-label">FILTER</span>
        <button class="chip on" data-f="all" type="button">すべて</button>
        <button class="chip" data-f="自転車" type="button">自転車</button>
        <button class="chip" data-f="バイク" type="button">バイク</button>
        <button class="chip" data-f="topgrade" type="button">状態 S・A</button>
        <span class="count-text ms-auto" id="count"></span>
      </div>

      <div class="row g-4" id="grid"></div>
    </div>
  </section>

  <!-- DETAIL -->
  <section id="detail" class="view py-4 py-lg-5">
    <div class="container">
      <a class="back-link" onclick="showListing()" tabindex="0" role="button">
        <span>←</span> 在庫一覧へ戻る
      </a>

      <div class="row g-4 align-items-start">
        <div class="col-lg-6">
          <div class="detail-panel">
            <div class="main-shot" id="mainShot"></div>
            <div class="row g-2 mt-2" id="thumbs"></div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="detail-side" id="info"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner d-flex flex-column flex-lg-row justify-content-between gap-2">
        <span class="mono fw-bold">OVERHAUL</span>
        <span>中古ロードバイク・モーターサイクル セレクト ／ 古物商許可 第000000000000号</span>
        <span class="mono">© 2026</span>
      </div>
    </div>
  </footer>
<script src = "js/main.js"></script>

</body>

</html>
